<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Atlas</title>
    
    <!-- Design Tools -->
    <script>
    let userLocation = null;
    let savedPlaces = [];

    // --- MATH ENGINE ---
    function getMinutes(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const distanceKm = R * c;
        return Math.round((distanceKm / 5) * 60); 
    }

    // --- LOCATION ENGINE (Improved for iOS) ---
    function startScanning() {
        // Change button look immediately to show it clicked
        const btn = event.currentTarget;
        btn.innerText = "System Scanning...";
        btn.style.background = "rgba(129, 140, 248, 0.1)";

        const geoOptions = {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        };

        // First, get a single "hit" to wake up the GPS
        navigator.geolocation.getCurrentPosition((pos) => {
            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            renderAtlas();
            
            // Then, start the continuous watch
            navigator.geolocation.watchPosition((position) => {
                userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                renderAtlas();
            }, null, geoOptions);

        }, (err) => {
            alert("GPS Error: " + err.message);
            btn.innerText = "Enable Real-Time Location";
        }, geoOptions);
    }

    // --- UI ENGINE ---
    function renderAtlas() {
        if (!userLocation || savedPlaces.length === 0) return;

        const list10 = document.getElementById('list-10min');
        const list15 = document.getElementById('list-15min');
        list10.innerHTML = ""; 
        list15.innerHTML = "";

        const sorted = savedPlaces.map(place => {
            const coords = place.geometry ? place.geometry.coordinates : null;
            if (!coords) return null;
            const minutes = getMinutes(userLocation.lat, userLocation.lng, coords[1], coords[0]);
            return { ...place, minutes };
        })
        .filter(p => p !== null)
        .sort((a, b) => a.minutes - b.minutes);

        sorted.forEach(place => {
            const element = document.createElement('div');
            element.className = "flex justify-between items-end fade-in font-normal";
            
            const isVeryClose = place.minutes <= 5;
            const timeColor = isVeryClose ? "text-indigo-400 opacity-100" : "opacity-30";
            const nameColor = isVeryClose ? "text-white" : "text-white/70";

            // If a new place enters the 5-min zone, vibrate the phone
            if (isVeryClose && window.navigator.vibrate) {
                window.navigator.vibrate([100, 50, 100]);
            }

            element.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-sm tracking-widest uppercase ${nameColor}">${place.properties.name || 'Unnamed Spot'}</span>
                </div>
                <span class="text-[9px] font-mono uppercase tracking-tighter ${timeColor}">${place.minutes} MIN WALK</span>
            `;

            if (place.minutes <= 10) {
                list10.appendChild(element);
            } else if (place.minutes <= 15) {
                list15.appendChild(element);
            }
        });
    }

    // --- MULTI-FILE HANDLER ---
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        const files = e.target.files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const json = JSON.parse(event.target.result);
                    const newPins = json.features || [];
                    savedPlaces = [...savedPlaces, ...newPins];
                    renderAtlas();
                } catch (err) { console.error("JSON Error"); }
            };
            reader.readAsText(file);
        });
        alert("Data Integrated. Move around to discover.");
    });

    // Toggle Button
    document.getElementById('more-btn').addEventListener('click', () => {
        const l15 = document.getElementById('list-15min');
        l15.classList.toggle('hidden');
    });
</script>
    
    <style>
        /* 1. Custom Font Integration */
        @font-face {
            font-family: 'DINdong';
            src: url('DINdong.otf') format('opentype');
            font-display: swap;
            font-style: normal;
        }

        /* 2. Global Styling - Purely Upright/No Italics */
        body { 
            font-family: 'DINdong', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            overflow: hidden; 
            font-style: normal !important;
            -webkit-font-smoothing: antialiased;
        }

        .serif { 
            font-family: 'DINdong', serif; 
            font-style: normal; 
        }

        /* 3. Artistic Glass Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(35px); 
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar for the list */
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>

<body class="h-screen flex items-center justify-center">

    <!-- Background Art -->
    <div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-zinc-900 to-indigo-950 opacity-60"></div>

    <!-- The Main App Interface -->
    <div id="popup-card" class="fixed top-10 inset-x-4 mx-auto max-w-md glass rounded-[2.5rem] p-10 shadow-2xl transition-all duration-1000">

        <div class="mb-6">
            <label class="text-[9px] opacity-30 uppercase tracking-[0.4em] block mb-3 font-normal">Step 1: Authorization</label>

            </button>

        <div class="mb-10">

        </div>

        <div id="list-10min" class="space-y-6 max-h-[30vh] overflow-y-auto custom-scroll pr-2">
            <div class="opacity-30 text-xs font-light tracking-wide font-normal">
                Awaiting data synchronization...
            </div>
        </div>

        <!-- Extension Trigger
