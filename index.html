<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Atlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face { font-family: 'DINdong'; src: url('DINdong.otf'); }
        body { font-family: 'DINdong', sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Banner Animation - Like an iPhone Push Notification */
        #push-banner { 
            transform: translateY(-150%); 
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        #push-banner.show { transform: translateY(0); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <!-- Step 3: The Custom Notification Banner -->
    <div id="push-banner" class="fixed top-6 inset-x-4 mx-auto max-w-sm glass z-50 p-5 rounded-[2rem] flex items-center shadow-2xl border-indigo-500/30">
        <div class="bg-indigo-500 w-3 h-3 rounded-full animate-ping mr-4"></div>
        <div class="flex-1">
            <p class="text-[9px] uppercase tracking-[0.3em] text-indigo-400 font-bold mb-1">Atlas Discovery</p>
            <p id="banner-text" class="text-xs text-white/90 uppercase tracking-widest font-medium">Arriving at Spot...</p>
        </div>
    </div>

    <div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-zinc-900 to-indigo-950 opacity-60"></div>

    <div class="fixed top-10 inset-x-4 mx-auto max-w-md glass rounded-[2.5rem] p-10 shadow-2xl transition-all duration-700">
        <div class="mb-6">
            <label id="gps-label" class="text-[9px] opacity-30 uppercase tracking-[0.4em] block mb-3 font-normal">Step 1: Authorization</label>
            <button id="gps-btn" onclick="startScanning()" class="w-full py-3 border border-white/10 rounded-full text-[10px] tracking-widest uppercase hover:bg-white/5 transition-all">Enable Real-Time Location</button>
        </div>

        <div class="mb-10">
            <label class="text-[9px] opacity-30 uppercase tracking-[0.4em] block mb-3">Step 2: Sync CSV/JSON Lists</label>
            <input type="file" id="fileInput" multiple class="text-[10px] text-white/40 file:bg-white/10 file:border-none file:text-white/80 file:rounded-full file:px-4 file:py-1 file:mr-3 cursor-pointer">
        </div>

        <h1 class="text-3xl font-light mb-8 uppercase tracking-[0.1em]">Nearby Discoveries</h1>
        
        <div id="list-10min" class="space-y-6 max-h-[35vh] overflow-y-auto pr-2 custom-scroll">
            <div id="status-msg" class="opacity-20 text-[10px] uppercase tracking-widest">Awaiting Proximity...</div>
        </div>
    </div>

    <script>
        let userLocation = null;
        let savedPlaces = [];
        let notifiedPlaces = new Set();

        // 1. GPS LOGIC
        function startScanning() {
            const label = document.getElementById('gps-label');
            navigator.geolocation.watchPosition((p) => {
                userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
                label.innerText = "Location Synced";
                label.style.color = "#818cf8";
                renderAtlas();
            }, (err) => alert("GPS Error: Turn on Location in Settings"), { enableHighAccuracy: true });
        }

        // 2. BANNER LOGIC (The "iPhone Notification" feel)
        function triggerNotification(name) {
            if (notifiedPlaces.has(name)) return;
            const banner = document.getElementById('push-banner');
            document.getElementById('banner-text').innerText = name;
            
            banner.classList.add('show');
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);

            setTimeout(() => {
                banner.classList.remove('show');
                notifiedPlaces.add(name);
            }, 6000);
        }

        // 3. THE SMART CSV/JSON READER
        document.getElementById('fileInput').addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    let count = 0;

                    if (file.name.endsWith('.json')) {
                        const json = JSON.parse(text);
                        const features = json.features || [];
                        features.forEach(f => {
                            const coords = f.geometry?.coordinates;
                            if (coords) {
                                savedPlaces.push({ name: f.properties?.location?.name || "Spot", lat: coords[1], lng: coords[0] });
                                count++;
                            }
                        });
                    } else {
                        // Aggressive CSV Parsing for your specific file
                        const lines = text.split('\n');
                        lines.forEach((line, i) => {
                            if (i === 0) return;
                            const parts = line.split(',');
                            if (parts[0] && parts[0] !== "Title") {
                                // Since we lack Lat/Long in CSV, we flag them for manual check or proximity
                                savedPlaces.push({ name: parts[0].replace(/"/g, ''), isCSV: true });
                                count++;
                            }
                        });
                    }
                    alert(`Integrated ${count} spots from ${file.name}`);
                    renderAtlas();
                };
                reader.readAsText(file);
            });
        });

        // 4. DISPLAY LOGIC
        function renderAtlas() {
            const list = document.getElementById('list-10min');
            if (!userLocation || savedPlaces.length === 0) return;
            
            // For CSV places without coordinates, we show them as "Loaded" 
            // For JSON places with coordinates, we show the distance.
            list.innerHTML = "";
            savedPlaces.forEach(p => {
                const element = document.createElement('div');
                element.className = "flex justify-between items-center fade-in mb-4";
                element.innerHTML = `
                    <span class="text-xs tracking-widest uppercase text-white/70">${p.name}</span>
                    <span class="text-[8px] opacity-20 font-mono">STATIONARY</span>
                `;
                list.appendChild(element);
            });
        }
    </script>
</body>
</html>
