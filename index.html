<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Atlas</title>
    
    <!-- 1. External Tools (Tailwind) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Your Styles (The Look) -->
    <style>
        @font-face {
            font-family: 'DINdong';
            src: url('DINdong.otf') format('opentype');
            font-display: swap;
        }

        body { 
            font-family: 'DINdong', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            overflow: hidden; 
        }

        .serif { font-family: 'DINdong', serif; }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center">

    <!-- The Background Art -->
    <div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-zinc-900 to-indigo-950 opacity-50"></div>

    <!-- The Top Card -->
    <div id="popup-card" class="fixed top-10 inset-x-4 mx-auto max-w-md glass rounded-[2rem] p-8 transform transition-all duration-1000 shadow-2xl">
        
        <!-- Data Initialization -->
        <div class="mb-4">
            <label class="text-[10px] opacity-40 uppercase tracking-widest block mb-2">Initialize Data</label>
            <input type="file" id="fileInput" class="text-[10px] text-white/60" accept=".json">
        </div>

        <h1 class="serif text-3xl italic font-light mb-6">Nearby Discoveries</h1>
        
        <div id="list-10min" class="space-y-4">
            <div class="flex justify-between items-center opacity-80">
                <span class="font-light tracking-wide italic">Upload your JSON to begin</span>
            </div>
        </div>

        <button id="more-btn" class="mt-8 w-full py-2 text-[10px] tracking-[0.3em] text-white/30 hover:text-white/80 transition-all uppercase border-t border-white/5 pt-4">
            [ search for more within 15mins ]
        </button>

        <div id="list-15min" class="hidden mt-4 space-y-4 pt-4 border-t border-white/5 animate-pulse text-white/40 text-xs">
            Search range extended...
        </div>
    </div>

    <!-- 3. The Brain (Must be at the BOTTOM) -->
    <script>
        const moreBtn = document.getElementById('more-btn');
        const list15 = document.getElementById('list-15min');

        moreBtn.addEventListener('click', () => {
            list15.classList.toggle('hidden');
            moreBtn.innerText = list15.classList.contains('hidden') ? 
                '[ search for more within 15mins ]' : '[ showing extended reach ]';
        });

        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    // Standard Google Takeout usually sits inside "features"
                    const count = data.features ? data.features.length : (Array.isArray(data) ? data.length : 0);
                    alert("Success! Found " + count + " artistic pins.");
                } catch (err) {
                    alert("Error reading file. Make sure it is a valid .json from Google.");
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
