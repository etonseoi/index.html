<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Atlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        .serif { font-family: 'Cormorant+Garamond', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <!-- The Background Art (Slow moving gradient) -->
    <div class="fixed inset-0 -z-10 bg-gradient-to-br from-black via-zinc-900 to-indigo-950 opacity-50"></div>

    <!-- The Top Card (Your Pop-up) -->
    <div id="popup-card" class="fixed top-10 inset-x-4 mx-auto max-w-md glass rounded-[2rem] p-8 transform transition-all duration-1000 shadow-2xl">
        <h1 class="serif text-3xl italic font-light mb-6">Nearby Discoveries</h1>
        
        <div id="list-10min" class="space-y-4">
            <!-- Items will appear here -->
            <div class="flex justify-between items-center opacity-80">
                <span class="font-light tracking-wide">The Blue Cafe</span>
                <span class="text-[10px] font-mono tracking-tighter uppercase opacity-40">4 min walk</span>
            </div>
        </div>

        <button id="more-btn" class="mt-8 w-full py-2 text-[10px] tracking-[0.3em] text-white/30 hover:text-white/80 transition-all uppercase border-t border-white/5 pt-4">
            [ search for more within 15mins ]
        </button>

        <div id="list-15min" class="hidden mt-4 space-y-4 pt-4 border-t border-white/5 animate-pulse">
            <div class="flex justify-between items-center opacity-50">
                <span class="font-light tracking-wide">Hidden Gallery</span>
                <span class="text-[10px] font-mono opacity-40">12 min walk</span>
            </div>
        </div>
    </div>

    <script>
        // Simple logic to show more items
        const moreBtn = document.getElementById('more-btn');
        const list15 = document.getElementById('list-15min');

        moreBtn.addEventListener('click', () => {
            list15.classList.toggle('hidden');
            moreBtn.innerText = list15.classList.contains('hidden') ? '[ search for more within 15mins ]' : '[ showing extended reach ]';
        });
    </script>
</body>
</html>
